name: Kafka to DB template check
description: Use JSON template for kafka-db-sink payload and verify it is stored
steps:
  - type: kafka
    name: Produce templated message
    brokers:
      - "{{kafkaBroker}}"
    topic: "{{kafkaTopic}}"
    key: "{{requestId}}"
    template: "example.json.tmpl"

  - type: db
    name: Verify templated message stored
    db_dsn: "{{dbDsn}}"
    db_query: "select id from kafka_messages order by created_at desc limit 1"
    assert:
      rows: 1

