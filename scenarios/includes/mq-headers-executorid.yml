mq_headers:
  # ISO 8601 с миллисекундами и смещением зоны, напр. 2026-04-01T11:42:08.546+03:00 (локальное время процесса)
  RequestDate: "{{__now:2006-01-02T15:04:05.000-07:00}}"
  JMSMessageID: "{requestId}"
  X_From: "gruzilla"
  X_ServiceID: "service-{executorId}"
  X_TransactionID: "plh1-{TransactionNumber}-{requestId}"
  X_Custom_Env: "serviceEnv"
  # Уникально на каждую итерацию — иначе при TPS>1 все воркеры делят один STOMP-селектор
  # и «зависают» на mq get; success_count/error_count не растут.
  RequestID: "service-{executorId}"
  X_MsgId: "{requestId}"
