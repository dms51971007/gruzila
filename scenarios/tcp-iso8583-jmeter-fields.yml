# ISO 8583 (moov-io), минимальный 0200 под хост с 4ascii-длиной и binary bitmap.
# tcp_iso8583_spec: spec87ascii_binmap — MTI[4] + сырой растр, как в типичном Kotlin-разборе.
#
# Поля 4, 12, 22, 24, 25, 35, 41, 42, 49 убраны: проще стыковка с упрощённым парсером мока
# (неизвестные биты в bitmap без сдвига offset ломают разбор).

name: "tcp-iso8583-jmeter-fields"
description: "TCP ISO8583 (moov-io), минимальные поля 0200"
steps:
  - type: tcp
    name: "iso-0200-moov"
    tcp_addr: "127.0.0.1:9000"
    tcp_length_prefix: "4ascii"
    tcp_iso8583_spec: spec87ascii_binmap
    tcp_iso8583_fields:
      "0": "0200"
      "3": "000000"
      "7": "{{__now:0102150405}}"
      "11": "{{__randDigits:6}}"
    tcp_read_timeout_ms: 30000
    tcp_read_max_bytes: 65536
    tcp_iso8583_extract:
      rc: "39"
      rsp_mti: "0" # MTI ответа (0210 на 0200)
    tcp_iso8583_assert:
      "0": "0210"
      "39": "00"
