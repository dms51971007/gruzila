name: "ibm-mq-example"
description: "Simple IBM MQ put test"
steps:
  - type: mq
    name: "put-to-queue"
    queue: "DEV.QUEUE.1"
    mq_conn_name: "{{mqHost}}(1414)"        # e.g. localhost(1414)
    mq_channel: "DEV.APP.SVRCONN"
    mq_queue_manager: "QM1"
    mq_user: "{{mqUser}}"                   # optional
    mq_password: "{{mqPassword}}"           # optional
    body: |
      {
        "operation": "test",
        "timestamp": "{{ts}}"
      }
