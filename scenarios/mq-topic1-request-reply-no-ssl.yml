# Artemis STOMP без TLS: omni_guid из REST-заглушки (localhost:8090), затем put/get topic1/topic2
name: "mq-topic1-request-reply-no-ssl"
description: "REST get omni_guid → mq put topic_1 → mq get topic_2_, assert status=success (no SSL)"
steps:
  - type: rest
    name: "get-omni-guid"
    rest_profile: "includes/rest-get-next-value.yml"
    rest_headers_profile: "includes/rest-headers-default.yml"

  - type: mq
    name: "put-request-topic1"
    mq_action: put
    queue: "topic_1"
    mq_profile: "includes/mq-conn-no-ssl.yml"
    mq_headers_profile: "includes/mq-headers-executorid.yml"
    template: "mq-request-omni.json.tmpl"

  - type: mq
    name: "get-reply-topic2"
    mq_action: get
    queue: "topic_2_"
    mq_selector: "X_ServiceID"
    mq_profile: "includes/mq-conn-no-ssl.yml"
    mq_wait_ms: 15000
    assert:
      success_field: "status"
      success: "success"
