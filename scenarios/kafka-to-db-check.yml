name: Kafka to DB check
description: Send message to Kafka and verify it is stored by kafka-db-sink
steps:
  - type: kafka
    name: Produce message for sink
    brokers:
      - "{{kafkaBroker}}"
    topic: "{{kafkaTopic}}"
    key: "{{requestId}}"
    body: '{"request_id":"{{requestId}}","event":"payment_created","ts":"{{timestamp}}"}'

  - type: db
    name: Verify message stored in kafka_messages
    db_dsn: "{{dbDsn}}"
    db_query: "select id from kafka_messages where topic = '{{kafkaTopic}}' and message_key = '{{requestId}}' order by created_at desc limit 1"
    assert:
      rows: 1

